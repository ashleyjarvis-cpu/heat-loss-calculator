<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heat Loss Estimator</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; color: #334155; }
        .wrapper { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #1e3a8a; text-align: center; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: #fff; }
        .results-box { background: #eff6ff; border: 2px solid #bfdbfe; padding: 30px; border-radius: 8px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; box-sizing: border-box; transition: all 0.3s ease; }
        .big-number { font-size: 38px; font-weight: bold; color: #2563eb; margin: 15px 0; }
        .btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: #1d4ed8; }
        .helper-link { display: inline-block; margin-top: 5px; font-size: 12px; color: #2563eb; text-decoration: none; }
        .helper-link:hover { text-decoration: underline; }
        .status-text { font-weight: bold; font-size: 13px; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.4; }
        
        /* Customer Logging Panel Styles */
        .customer-panel { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .panel-title { font-weight: bold; font-size: 15px; color: #1e3a8a; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; display: flex; align-items: center; gap: 6px; }
        .flex-inputs { display: flex; gap: 15px; }
        .flex-inputs .input-group { flex: 1; margin-bottom: 0; }
        @media (max-width: 500px) { .flex-inputs { flex-direction: column; gap: 15px; } }
        
        /* New Property Area Calculator Panel Styles */
        .area-calc-panel { border: 1px dashed #cbd5e1; background: #f8fafc; padding: 20px; border-radius: 8px; margin-top: 25px; }
        .area-calc-title { font-weight: bold; font-size: 15px; color: #1e3a8a; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
        .inline-inputs { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 15px; }
        .inline-inputs .input-group { margin-bottom: 0; flex: 1; }
        .calc-sym { align-self: flex-end; padding-bottom: 10px; font-weight: bold; color: #64748b; font-size: 18px; }
        .btn-secondary { background: #475569; }
        .btn-secondary:hover { background: #334155; }
        .required-star { color: #dc2626; margin-left: 2px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Heat Loss Estimator</h1>

    <div class="customer-panel">
        <div class="panel-title">👤 Customer Validation Details</div>
        <div class="flex-inputs">
            <div class="input-group">
                <label>Customer Name<span class="required-star">*</span></label>
                <input type="text" id="custName" placeholder="e.g. John Doe">
            </div>
            <div class="input-group">
                <label>Postcode<span class="required-star">*</span></label>
                <input type="text" id="custPostcode" placeholder="e.g. BN1 1GE" style="text-transform: uppercase;">
            </div>
        </div>
    </div>
        
    <div class="grid">
        <div>
            <div class="input-group">
                <label>Total Internal Floor Area (m²)</label>
                <input type="number" id="area" value="100">
                <a href="https://www.gov.uk/find-energy-certificate" target="_blank" class="helper-link">Find your floor area on your EPC</a>
            </div>
            <div class="input-group">
                <label>Property Building Era (For Ventilation / Air tightness)</label>
                <select id="airEra">
                    <option value="1.5" selected>Pre-2000 Property (Drafty)</option>
                    <option value="0.5">Post-2000 Property (Tighter)</option>
                </select>
                <a href="https://propertychecker.co.uk/" target="_blank" class="helper-link">Check your property age</a>
            </div>
            <div class="input-group">
                <label>Wall Type &amp; Status</label>
                <select id="wallSelection">
                    <option value="0.42" selected>Cavity Wall (Post-1960, Insulated)</option>
                    <option value="0.77">Cavity Wall (Post-1960, Open)</option>
                    <option value="0.56">Cavity Wall (Pre-1960, Insulated)</option>
                    <option value="1.37">Cavity Wall (Pre-1960, Open)</option>
                    <option value="2.11">Solid Wall</option>
                    <option value="2.23">Stone Wall</option>
                    <option value="0.6">Solid Wall / Stone Wall (Insulated)</option>
                    <option value="1.0">Timber Frame (Post-1960)</option>
                    <option value="2.5">Timber Frame (Pre-1960)</option>
                </select>
                <a href="https://www.gov.uk/find-energy-certificate" target="_blank" class="helper-link">Find your wall type on your EPC</a>
            </div>
                        
            <input type="button" class="btn" value="Calculate Heat Loss" onclick="runCalc()">
        
            <div class="area-calc-panel">
                <div class="area-calc-title">📐 Property Area Calculator</div>
                <div class="inline-inputs">
                    <div class="input-group">
                        <label>Width (m)</label>
                        <input type="number" id="calcWidth" placeholder="0" oninput="autoCalcArea()">
                    </div>
                    <div class="calc-sym">×</div>
                    <div class="input-group">
                        <label>Depth (m)</label>
                        <input type="number" id="calcDepth" placeholder="0" oninput="autoCalcArea()">
                    </div>
                    <div class="calc-sym">×</div>
                    <div class="input-group">
                        <label>Floors</label>
                        <input type="number" id="calcFloors" value="1" min="1" oninput="autoCalcArea()">
                    </div>
                </div>
                <div class="input-group">
                    <label>Calculated Internal Floor Area: <span id="calcResultDisplay" style="color: #2563eb;">0</span> m²</label>
                </div>
                <input type="button" class="btn btn-secondary" value="Use This Total Floor Area" onclick="populateFloorArea()">
            </div>
        </div>
                        
        <div>
            <div class="results-box" id="resultsBox">
                <div style="font-weight: bold; color: #1e40af; font-size: 14px; letter-spacing: 0.5px;">ESTIMATED PEAK LOSS</div>
                <div class="big-number" id="displayWatts">--- W</div>
                <div style="font-weight: bold; color: #475569; font-size: 20px;" id="displayKw">--- kW</div>
                <div id="statusMessage" class="status-text"></div>
            </div>
        </div>
    </div>
</div>

<script>
function validateCustomerDetails() {
    var name = document.getElementById('custName').value.trim();
    var postcode = document.getElementById('custPostcode').value.trim();
    
    if (!name) {
        alert("Please enter the Customer Name before performing any calculations.");
        document.getElementById('custName').focus();
        return false;
    }
    if (!postcode) {
        alert("Please enter the Customer Postcode before performing any calculations.");
        document.getElementById('custPostcode').focus();
        return false;
    }
    return true;
}

function autoCalcArea() {
    var width = parseFloat(document.getElementById('calcWidth').value) || 0;
    var depth = parseFloat(document.getElementById('calcDepth').value) || 0;
    var floors = parseFloat(document.getElementById('calcFloors').value) || 1;
        
    var calculatedM2 = width * depth * floors;
    document.getElementById('calcResultDisplay').innerText = calculatedM2 % 1 === 0 ? calculatedM2 : calculatedM2.toFixed(2);
}

function populateFloorArea() {
    if (!validateCustomerDetails()) return;

    var width = parseFloat(document.getElementById('calcWidth').value) || 0;
    var depth = parseFloat(document.getElementById('calcDepth').value) || 0;
    var floors = parseFloat(document.getElementById('calcFloors').value) || 1;
        
    var finalArea = width * depth * floors;
    if (finalArea <= 0) {
        alert("Please enter valid width, depth, and floor parameters to generate an area value.");
        return;
    }
        
    document.getElementById('area').value = finalArea % 1 === 0 ? finalArea : finalArea.toFixed(2);
    runCalc();
}

function runCalc() {
    var isInitialLoad = (event && event.type === 'DOMContentLoaded') || !document.getElementById('custName');
    if (!isInitialLoad && !validateCustomerDetails()) {
        return;
    }

    try {
        var areaInput = document.getElementById('area').value;
        var totalArea = parseFloat(areaInput);
                
        if (isNaN(totalArea) || totalArea <= 0) {
            totalArea = 100;
            document.getElementById('area').value = 100;
        }
        var achRate = parseFloat(document.getElementById('airEra').value);
        var wallU = parseFloat(document.getElementById('wallSelection').value);
                
        // Enforced hardcoded constants
        var typeMod = 1.0; // Detached
        var storeys = 2;
        var roofU = 0.21;  // 200mm insulation
        var dT = 23;       // 23°C Temperature Difference
                
        var floorU = 0.55; 
        var windowU = 2.80; 
        var standardCeilingHeight = 2.8;
                
        // 1. Structural Geometry Setup
        var footprint = totalArea / storeys;
        var perimeter = Math.sqrt(footprint) * 4 * typeMod;
        var totalHeight = storeys * standardCeilingHeight;
                        
        var grossWall = perimeter * totalHeight;
        var windowArea = grossWall * 0.15;
        var netWall = grossWall - windowArea;
                
        // 2. Structural Fabric Energy Loss
        var wallL = wallU * netWall * dT;
        var floorL = floorU * footprint * dT;
        var roofL = roofU * footprint * dT;
        var winL = windowU * windowArea * dT;
        var fabricTotal = wallL + floorL + roofL + winL;
                
        // 3. Volumetric Ventilation Math
        var propertyVolume = totalArea * standardCeilingHeight; 
        var ventilationLoss = propertyVolume * achRate * 0.33 * dT;
                
        // 4. Combined Absolute Result Matrix
        var grandTotal = fabricTotal + ventilationLoss;
        var calculatedKw = grandTotal / 1000;
                
        // Write directly to UI elements
        document.getElementById('displayWatts').innerHTML = Math.round(grandTotal).toLocaleString() + " W";
        document.getElementById('displayKw').innerHTML = calculatedKw.toFixed(2) + " kW";
                        
        // Target elements for visual rules
        var resultsBox = document.getElementById('resultsBox');
        var statusMessage = document.getElementById('statusMessage');
                
        // Threshold evaluation and styling
        if (calculatedKw <= 16.9) {
            resultsBox.style.background = "#f0fdf4"; 
            resultsBox.style.borderColor = "#bbf7d0";  
            statusMessage.style.color = "#16a34a";     
            statusMessage.innerHTML = "suitable for survey";
        } else {
            resultsBox.style.background = "#fef2f2"; 
            resultsBox.style.borderColor = "#fecaca";  
            statusMessage.style.color = "#dc2626";     
            statusMessage.innerHTML = "unsuitable for survey due to being outside of design scope";
        }
            
    } catch(err) {
        alert("Calculation Error: " + err.message);
    }
}

document.addEventListener("DOMContentLoaded", function() {
    runCalc();
});
</script>
</body>
</html>
